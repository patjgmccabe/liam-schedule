<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Weekly Summary — Liam's Schedule</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- Navigation -->
  <div class="navbar">
    <div class="navbar-left">
      <h1><span class="logo-icon">&#9201;</span> Liam's Schedule</h1>
      <nav id="navLinks" style="display:none;">
        <a href="index.html">Schedule</a>
        <a href="summary.html" class="active">Weekly Summary</a>
      </nav>
    </div>
    <div class="navbar-right" id="navUser">
      <!-- Populated by JS -->
    </div>
  </div>

  <!-- Sign In Widget (shown when not authenticated) -->
  <div id="signinWidget" class="signin-widget-wrapper">
    <div class="modal login-modal signin-widget-card">
      <div class="login-modal-logo">
        <span class="logo-mark">&#9201;</span>
        <h3>Liam's <span class="teal">Schedule</span></h3>
      </div>
      <p class="login-subtitle">Sign in to view and claim shifts</p>
      <div class="form-group">
        <label>Email</label>
        <input type="email" id="widgetEmail" placeholder="your@email.com"
          onkeydown="if(event.key==='Enter') loginWidget()">
      </div>
      <div class="form-group">
        <label>Password</label>
        <input type="password" id="widgetPassword" placeholder="••••••••"
          onkeydown="if(event.key==='Enter') loginWidget()">
      </div>
      <p id="widgetError" class="login-error"></p>
      <button class="btn btn-primary login-btn-full" onclick="loginWidget()">Sign In</button>
    </div>
  </div>

  <div class="container" id="mainContent" style="display:none;">

    <!-- Summary Card -->
    <div class="card">
      <div class="card-header">
        <h2>Weekly Hours by Participant</h2>
      </div>
      <div class="table-wrapper">
        <table class="summary-table" id="summaryTable">
          <thead>
            <tr>
              <th>Week</th>
              <th>Brendan</th>
              <th>Caleigh</th>
              <th>Shannon</th>
              <th>Kelly</th>
              <th>Aidan</th>
              <th>Week Total</th>
              <th></th>
            </tr>
          </thead>
          <tbody id="summaryBody">
            <tr><td colspan="8" class="empty-state"><p>Loading summary...</p></td></tr>
          </tbody>
        </table>
      </div>
    </div>

    <!-- Individual Totals Card -->
    <div class="card">
      <div class="card-header">
        <h2>Overall Totals</h2>
      </div>
      <div id="totalsGrid" style="display:grid; grid-template-columns: repeat(auto-fit, minmax(140px, 1fr)); gap:1rem;">
        <!-- Filled by JS -->
      </div>
    </div>

  </div>

  <!-- Toast Container -->
  <div class="toast-container" id="toastContainer"></div>

  <!-- Scripts -->
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-database-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
  <script src="summary.js"></script>
</body>
</html>
